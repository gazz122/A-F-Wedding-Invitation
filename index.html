<!-- Content Hidden Until Clicked (Simplified logic for the landing screen) -->
<script>
let musicPlaying = false;
const bgMusic = document.getElementById('bgMusic');

function toggleMusic() {
    const icon = document.getElementById('music-icon');

    if (musicPlaying) {
        bgMusic.pause();
        musicPlaying = false;

        icon.innerText = 'music_off';
        icon.classList.remove('animate-pulse');
    } else {
        bgMusic.play();
        musicPlaying = true;

        icon.innerText = 'music_note';
        icon.classList.add('animate-pulse');
    }
}

function openInvitation() {

    sessionStorage.setItem('musicPlaying', 'true');
    sessionStorage.setItem('musicTime', '0');

    window.location.href =
        'home.html' + window.location.search;
}

// Auto play setelah user pertama kali klik layar
document.addEventListener('click', function startMusic() {
    if (!musicPlaying) {
        bgMusic.play().then(() => {
            musicPlaying = true;

            const icon = document.getElementById('music-icon');
            if (icon) {
                icon.innerText = 'music_note';
                icon.classList.add('animate-pulse');
            }
        }).catch(() => {});
    }
}, { once: true });

// Ambil nama tamu dari URL
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const guest = params.get('to');

    const guestDisplay = document.getElementById('guest-name');

    if (guest && guestDisplay) {
        guestDisplay.textContent = decodeURIComponent(guest);
    }
});

</script>
